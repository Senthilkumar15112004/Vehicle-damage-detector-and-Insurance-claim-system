spring.application.name=vehicledamage

# --- DATABASE CONFIG (Docker) ---
# 🟢 FIX: Use 'mysql-db' instead of 'localhost'
spring.datasource.url=jdbc:mysql://mysql-db:3306/claim_db
spring.datasource.username=root
# Ensure this matches your docker-compose environment variable
spring.datasource.password=Kishore@2004
spring.jpa.hibernate.ddl-auto=update

# --- PYTHON ML SERVICE (Docker) ---
# 🟢 FIX: Use 'python-api' instead of '127.0.0.1'
ml.api.base-url=http://python-api:8000

# --- SECURITY & JWT ---
jwt.secret-key=yourSecretKeyForVehicleDamageEstimationAppMustBeLongAndSecure12345

# 🟢 FIX: This is the missing piece causing your Redirect Issue!
app.frontend-url=https://my-vehicle-app.eastus.cloudapp.azure.com

# --- OAUTH2 GOOGLE ---
# Ensure these environment variables are set in docker-compose.yml or replace them here with actual keys
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# 🟢 FORCE FIX: Hardcode the public URL to prevent Docker/Proxy mismatches
spring.security.oauth2.client.registration.google.redirect-uri=https://my-vehicle-app.eastus.cloudapp.azure.com/login/oauth2/code/google
# --- FILE UPLOAD ---
upload.dir=/uploads/
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- PROXY CONFIGURATION (CRITICAL FOR OAUTH) ---
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
# This checks the "Host" header we added in Caddy
server.tomcat.remoteip.host-header=X-Forwarded-Host


# --- FIX SESSION COOKIES (CRITICAL FOR OAUTH) ---
# Allow cookies to be sent over HTTPS
server.servlet.session.cookie.secure=true
# Allow cookies to pass between Google and your site
server.servlet.session.cookie.same-site=lax
# Ensure the cookie is accessible
server.servlet.session.cookie.http-only=true

# 🟢 DEBUGGING: Reveal why OAuth is failing
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.web=DEBUG
